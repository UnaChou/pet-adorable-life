{% extends "base.html" %}

{% block title %}Pet Life - Pet Adorable Life{% endblock %}

{% block content %}
<nav class="nav-bar">
    <a href="/" class="logo">Pet Adorable Life</a>
    <ul class="nav-links">
        <li><a href="/">首頁</a></li>
        <li><a href="/product/analyze">商品分析</a></li>
        <li><a href="/organize" class="active">Pet Life</a></li>
        <li><a href="/diary">寵物日記</a></li>
        <li><a href="/pets">寵物</a></li>
        <li><a href="/logout">登出</a></li>
    </ul>
</nav>

<main class="organize-page">
    <section class="organize-hero">
        <h1>📋 Pet Life</h1>
        <p>結構化整理商品資訊與寵物日記，一目了然</p>
    </section>

    <!-- Pet filter tabs -->
    <div class="pet-filter-bar" id="petFilterBar" style="margin-bottom:12px;"></div>

    <div class="tabs-container">
        <div class="tabs-header">
            <button class="tab-btn active" data-tab="products-tab">📦 商品列表</button>
            <button class="tab-btn" data-tab="diaries-tab">📔 寵物日記</button>
        </div>

        <div class="tab-content active" id="products-tab">
            <div class="tab-actions">
                <button type="button" class="btn-toggle-add" id="btnToggleAddProduct">➕ 新增商品</button>
            </div>
            <section class="organize-add" id="addProductSection" style="display:none;">
                <h2>新增商品</h2>
                <div class="add-form">
                    <div class="form-group">
                        <label for="addTitle">商品名稱</label>
                        <input type="text" id="addTitle" placeholder="例如：歐奇斯無穀成犬飼料" maxlength="200">
                    </div>
                    <div class="form-group">
                        <label for="addSummary">商品摘要</label>
                        <textarea id="addSummary" rows="5" placeholder="輸入商品描述、特色要點等..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="addPetId">適用寵物</label>
                        <select id="addPetId"><option value="">未指定</option></select>
                    </div>
                    <button type="button" class="btn-add" id="btnAddProduct">加入列表</button>
                </div>
            </section>
            <section class="organize-list" id="productList">
                <div class="loading" id="productsLoading"><div class="spinner"></div><p>載入中...</p></div>
            </section>
        </div>

        <div class="tab-content" id="diaries-tab">
            <section class="diary-list" id="diaryList">
                <div class="loading" id="diariesLoading"><div class="spinner"></div><p>載入中...</p></div>
            </section>
        </div>
    </div>
</main>

<script>
(function () {
    let allPets = [];
    let currentPetFilter = null; // null = 全部

    // Tab switching
    const tabBtns = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');
    function switchTab(tabId) {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabContents.forEach(c => c.classList.remove('active'));
        const btn = document.querySelector(`.tab-btn[data-tab="${tabId}"]`);
        if (btn) { btn.classList.add('active'); document.getElementById(tabId).classList.add('active'); }
    }
    tabBtns.forEach(btn => btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab'))));
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('tab')) switchTab(urlParams.get('tab') + '-tab');

    // Toggle add form
    const btnToggle = document.getElementById('btnToggleAddProduct');
    const addSection = document.getElementById('addProductSection');
    btnToggle.addEventListener('click', () => {
        const open = addSection.style.display !== 'none';
        addSection.style.display = open ? 'none' : 'block';
        btnToggle.textContent = open ? '➕ 新增商品' : '➖ 隱藏新增商品';
    });

    // Load pets → render filter bar + populate selects
    async function loadPets() {
        try {
            const res = await fetch('/api/pets');
            if (!res.ok) throw new Error();
            const data = await res.json();
            allPets = data.pets || [];
        } catch (e) {
            allPets = [];
        }
        renderPetFilter();
        populatePetSelects();
    }

    function renderPetFilter() {
        const bar = document.getElementById('petFilterBar');
        const tabs = [{ id: null, label: '全部' }, ...allPets.map(p => ({ id: p.id, label: p.name })), { id: 0, label: '未指定' }];
        bar.innerHTML = tabs.map(t =>
            `<button class="tab-btn pet-filter-btn ${t.id === currentPetFilter ? 'active' : ''}" data-pet="${t.id === null ? 'null' : t.id}">${t.label}</button>`
        ).join('');
        bar.querySelectorAll('.pet-filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.dataset.pet;
                currentPetFilter = val === 'null' ? null : parseInt(val);
                renderPetFilter();
                loadProducts();
                loadDiaries();
            });
        });
    }

    function populatePetSelects() {
        const sel = document.getElementById('addPetId');
        if (!sel) return;
        const current = sel.value;
        sel.innerHTML = '<option value="">未指定</option>' +
            allPets.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        sel.value = current;
    }

    function petFilterQuery() {
        if (currentPetFilter === null) return '';
        return `?pet_id=${currentPetFilter}`;
    }

    function petName(pet_id) {
        const p = allPets.find(p => p.id === pet_id);
        return p ? p.name : '';
    }

    // Products
    async function loadProducts() {
        const productsSpinner = document.getElementById('productsLoading');
        if (productsSpinner) productsSpinner.style.display = 'flex';
        try {
            const res = await fetch('/api/products' + petFilterQuery());
            if (!res.ok) throw new Error();
            const data = await res.json();
            renderProducts(data.products || []);
        } catch (e) {
            document.getElementById('productList').innerHTML = '<p>載入失敗，請重新整理</p>';
        } finally {
            const s = document.getElementById('productsLoading');
            if (s) s.style.display = 'none';
        }
    }

    function renderProducts(products) {
        const el = document.getElementById('productList');
        if (!products.length) {
            el.innerHTML = '<div class="empty-state"><span class="empty-icon">📦</span><p>尚無商品，點擊「➕ 新增商品」或從 <a href="/product/analyze">商品分析</a> 加入</p></div>';
            return;
        }
        el.innerHTML = `<div class="list-header"><h2>商品列表 <span class="count">共 ${products.length} 項</span></h2></div>
            <div class="product-cards timeline-list">` +
            products.map(p => `
            <article class="product-card timeline-item">
                <div class="timeline-dot"></div>
                <div class="product-card-body">
                    <div class="product-meta">
                        <span class="product-id">#${p.id}</span>
                        ${p.pet_id ? `<span class="product-id">🐾 ${petName(p.pet_id)}</span>` : ''}
                        <span class="product-dates">建立：${p.created_at ? new Date(p.created_at).toLocaleString('zh-TW') : '-'}</span>
                    </div>
                    <h3 class="product-title">${p.title}</h3>
                    <div class="product-summary">${(p.summary || '').replace(/\n/g, '<br>')}</div>
                </div>
                <div class="product-card-actions">
                    <a href="/organize/edit/${p.id}" class="btn-edit" title="編輯">✎</a>
                    <button class="btn-remove" data-id="${p.id}" title="移除">✕</button>
                </div>
            </article>`).join('') +
        '</div>';

        el.querySelectorAll('.btn-remove').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('確定要刪除此商品嗎？')) return;
                try {
                    await fetch(`/api/products/${btn.dataset.id}`, { method: 'DELETE' });
                    loadProducts();
                } catch (e) {
                    alert('刪除失敗，請稍後再試');
                }
            });
        });
    }

    document.getElementById('btnAddProduct').addEventListener('click', async () => {
        const title = document.getElementById('addTitle').value.trim();
        const summary = document.getElementById('addSummary').value.trim();
        const pet_id = document.getElementById('addPetId').value || null;
        try {
            const res = await fetch('/api/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, summary, pet_id: pet_id ? parseInt(pet_id) : null })
            });
            if (res.ok) {
                document.getElementById('addTitle').value = '';
                document.getElementById('addSummary').value = '';
                addSection.style.display = 'none';
                btnToggle.textContent = '➕ 新增商品';
                loadProducts();
            } else {
                alert('新增失敗，請重試');
            }
        } catch (e) {
            alert('操作失敗，請稍後再試');
        }
    });

    // Diaries
    async function loadDiaries() {
        const diariesSpinner = document.getElementById('diariesLoading');
        if (diariesSpinner) diariesSpinner.style.display = 'flex';
        try {
            const res = await fetch('/api/diaries' + petFilterQuery());
            if (!res.ok) throw new Error();
            const data = await res.json();
            renderDiaries(data.diaries || []);
        } catch (e) {
            document.getElementById('diaryList').innerHTML = '<p>載入失敗，請重新整理</p>';
        } finally {
            const s = document.getElementById('diariesLoading');
            if (s) s.style.display = 'none';
        }
    }

    function renderDiaries(diaries) {
        const el = document.getElementById('diaryList');
        if (!diaries.length) {
            el.innerHTML = '<div class="list-header"><h2>日記列表 <span class="count">共 0 則</span></h2></div><div class="empty-state"><span class="empty-icon">📔</span><p>尚無日記，請前往 <a href="/diary">寵物日記</a> 新增</p></div>';
            return;
        }
        el.innerHTML = `<div class="list-header"><h2>日記列表 <span class="count">共 ${diaries.length} 則</span></h2></div>
            <div class="diary-cards timeline-list">` +
            diaries.map(d => `
            <article class="diary-card timeline-item">
                <div class="timeline-dot"></div>
                <div class="diary-card-body">
                    ${d.image_base64 ? `<div class="diary-image-wrapper"><img src="${d.image_base64}" alt="Diary Image" class="diary-thumbnail"></div>` : ''}
                    <div class="diary-meta">
                        <span class="diary-id">#${d.id}</span>
                        ${d.pet_id ? `<span class="diary-id">🐾 ${petName(d.pet_id)}</span>` : ''}
                        <span class="diary-dates">${d.created_at ? new Date(d.created_at).toLocaleString('zh-TW') : '-'}</span>
                    </div>
                    ${d.title ? `<h4 class="diary-title">${d.title}</h4>` : ''}
                    <div class="diary-emotion">${d.main_emotion}</div>
                    <div class="diary-describe">${(d.describe_text || '').replace(/\n/g, '<br>')}</div>
                    ${d.memo ? `<div class="diary-memo"><strong>備註：</strong>${d.memo.replace(/\n/g, '<br>')}</div>` : ''}
                </div>
                <div class="diary-card-actions">
                    <button class="btn-remove" data-id="${d.id}" title="移除">✕</button>
                </div>
            </article>`).join('') +
        '</div>';

        el.querySelectorAll('.btn-remove').forEach(btn => {
            btn.addEventListener('click', async () => {
                if (!confirm('確定要刪除此日記嗎？')) return;
                try {
                    await fetch(`/api/diaries/${btn.dataset.id}`, { method: 'DELETE' });
                    loadDiaries();
                } catch (e) {
                    alert('刪除失敗，請稍後再試');
                }
            });
        });
    }

    async function init() {
        await loadPets();
        loadProducts();
        loadDiaries();
    }
    init();
})();
</script>
{% endblock %}
