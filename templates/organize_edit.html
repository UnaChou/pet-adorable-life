{% extends "base.html" %}

{% block title %}編輯商品 - Pet Adorable Life{% endblock %}

{% block content %}
<nav class="nav-bar">
    <a href="/" class="logo">Pet Adorable Life</a>
    <ul class="nav-links">
        <li><a href="/">首頁</a></li>
        <li><a href="/product/analyze">商品分析</a></li>
        <li><a href="/organize" class="active">Pet Life</a></li>
        <li><a href="/diary">寵物日記</a></li>
        <li><a href="/pets">寵物</a></li>
        <li><a href="/logout">登出</a></li>
    </ul>
</nav>

<main class="organize-page">
    <section class="organize-hero">
        <h1>✎ 編輯商品</h1>
        <p>修改後將更新至資料庫</p>
    </section>
    <section class="organize-add">
        <div class="add-form" id="editForm">
            <div class="form-group">
                <label for="editTitle">商品名稱</label>
                <input type="text" id="editTitle" placeholder="例如：歐奇斯無穀成犬飼料" maxlength="500">
            </div>
            <div class="form-group">
                <label for="editSummary">商品摘要</label>
                <textarea id="editSummary" rows="8" placeholder="輸入商品描述、特色要點等..."></textarea>
            </div>
            <div class="form-group">
                <label for="editPetId">適用寵物</label>
                <select id="editPetId"><option value="">未指定</option></select>
            </div>
            <div class="form-actions">
                <button type="button" class="btn-add" id="btnSave">儲存更新</button>
                <a href="/organize" class="btn-cancel">取消</a>
            </div>
        </div>
    </section>
</main>

<script>
(function () {
    const productId = {{ product_id }};

    async function load() {
        const [prodRes, petsRes] = await Promise.all([
            fetch(`/api/products/${productId}`),
            fetch('/api/pets'),
        ]);
        if (!prodRes.ok) { window.location.href = '/organize'; return; }
        const product = await prodRes.json();
        const { pets } = await petsRes.json();

        document.getElementById('editTitle').value = product.title;
        document.getElementById('editSummary').value = product.summary;

        const sel = document.getElementById('editPetId');
        (pets || []).forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            sel.appendChild(opt);
        });
        sel.value = product.pet_id || '';
    }

    document.getElementById('btnSave').addEventListener('click', async () => {
        const title = document.getElementById('editTitle').value.trim();
        const summary = document.getElementById('editSummary').value.trim();
        const pet_id = document.getElementById('editPetId').value;
        try {
            const res = await fetch(`/api/products/${productId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, summary, pet_id: pet_id ? parseInt(pet_id) : null }),
            });
            if (res.ok) {
                window.location.href = '/organize';
            } else {
                alert('更新失敗，請重試');
            }
        } catch (e) {
            alert('操作失敗，請稍後再試');
        }
    });

    load();
})();
</script>
{% endblock %}
