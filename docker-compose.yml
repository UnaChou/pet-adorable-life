services:
  mysql:
    image: mysql:8.0
    container_name: pet-adorable-life-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: pet_adorable_life
      MYSQL_USER: pet_user
      MYSQL_PASSWORD: pet_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet-network

  web:
    build: .
    container_name: pet-adorable-life-web
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: pet_user
      MYSQL_PASSWORD: pet_password
      MYSQL_DATABASE: pet_adorable_life
      OLLAMA_URL: ${OLLAMA_URL:-http://192.168.50.11:11434/api/generate}
      FLASK_APP: app.py
      FLASK_DEBUG: "0"
    volumes:
      - .:/app
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - pet-network

networks:
  pet-network:
    driver: bridge

volumes:
  mysql_data:
